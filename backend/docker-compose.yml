services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zest-backend
    ports:
      - "7860:7860"
    environment:
      PORT: 7860
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/zest
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: zest_secret
      BREVO_API_KEY: ""
      BREVO_FROM_EMAIL: ""
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      GOOGLE_CALLBACK_URL: http://localhost:7860/auth/google/callback
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: zest-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data: